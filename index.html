<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian 的個人網站</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 50px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #ff5a5f; }
        .btn {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 14px 28px;
            margin: 25px 0;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 4px 6px rgba(0,123,255,0.2);
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,123,255,0.3);
        }
        p { line-height: 1.6; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>哈囉，歡迎來到我的網站！🚀</h1>
        <p>這是我在 GitHub 上架設的第一個網頁。</p>
        <p>未來我會在這裡整理我的日常紀錄，以及各種有趣的專案。</p>
        
        <a href="invest.html" class="btn">📊 進入「投資」儀表板</a>
        
        <p style="margin-top: 15px; color: #999; font-size: 0.85em;">網站建置中，敬請期待！</p>
    </div>
</body>
</html>
