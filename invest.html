<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財經與工具儀表板 - Brian</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .dashboard {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 1.3em;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .card p {
            color: #666;
            line-height: 1.6;
            font-size: 0.95em;
        }
        .card-btn {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
            font-size: 0.9em;
        }
        .card-btn:hover {
            background-color: #27ae60;
        }
        .back-btn {
            display: inline-block;
            color: #7f8c8d;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: bold;
            transition: color 0.2s;
        }
        .back-btn:hover {
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <a href="index.html" class="back-btn">⬅ 返回首頁</a>
        <h1>📊 財經與工具儀表板</h1>
        
        <div class="grid">
            <div class="card">
                <h2>🛠️ Streamlit 自動化工具</h2>
                <p>整合 Python 金融 API 打造的專屬看盤軟體入口。點擊下方連結可直接開啟自動化數據追蹤儀表板。</p>
                <a href="https://share.streamlit.io/" target="_blank" class="card-btn">啟動看盤軟體 🚀</a>
            </div>

            <div class="card">
                <h2>📈 台股與全球 ETF 觀測</h2>
                <p>專注於長期資產配置與熱門標的追蹤，包含相關數據統計、市場波動與核心持股動態分析。</p>
                <a href="#" class="card-btn">檢視觀測清單 📋</a>
            </div>

            <div class="card">
                <h2>🪙 數位資產與衍生品數據</h2>
                <p>即時追蹤主流虛擬貨幣市場行情、區塊鏈項目基本面，以及各交易平台的衍生品合約數據與策略分配。</p>
                <a href="#" class="card-btn">查看資產配置 🔐</a>
            </div>
        </div>
    </div>
</body>
</html>
